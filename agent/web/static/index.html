<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexalith Foreman</title>
<style>
  :root {
    --graphite: #1A1D1F;
    --graphite-light: #22262A;
    --amber: #E8A23D;
    --bone: #EDEAE3;
    --slate: #5A6168;
    --safety-black: #0D0E0F;
    --healthy: #5B8C5A;
    --stale: #C2654A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--graphite);
    color: var(--bone);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
  }

  .chat-rail {
    background: var(--safety-black);
    border-right: 1px solid #2A2E32;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .brand {
    padding: 24px 20px 16px;
    border-bottom: 1px solid #2A2E32;
  }

  .brand .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--slate);
    font-weight: 700;
  }

  .brand h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .brand .underline {
    width: 60px;
    height: 3px;
    background: var(--amber);
    margin-top: 8px;
  }

  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user {
    color: var(--bone);
    font-weight: 600;
  }

  .msg.user::before {
    content: "\203A ";
    color: var(--amber);
  }

  .msg.agent {
    color: var(--slate);
    white-space: pre-wrap;
  }

  .msg.agent.loading {
    color: var(--amber);
  }

  .msg .md-h {
    display: block;
    color: var(--amber);
    font-size: 12px;
    letter-spacing: 1px;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .chat-input-row {
    border-top: 1px solid #2A2E32;
    padding: 14px;
    display: flex;
    gap: 8px;
  }

  .chat-input-row input {
    flex: 1;
    background: var(--graphite-light);
    border: 1px solid #2A2E32;
    color: var(--bone);
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 3px;
  }

  .chat-input-row input:focus {
    outline: none;
    border-color: var(--amber);
  }

  .chat-input-row button {
    background: var(--amber);
    color: var(--safety-black);
    border: none;
    font-weight: 700;
    padding: 10px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .chat-input-row button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .board {
    overflow-y: auto;
    padding: 28px 32px;
  }

  .board-header {
    margin-bottom: 24px;
  }

  .board-header .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--slate);
    font-weight: 700;
  }

  .board-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--graphite-light);
    border: 1px solid #2A2E32;
    border-radius: 4px;
    padding: 18px;
  }

  .panel-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--slate);
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
  }

  .panel-title .count {
    color: var(--amber);
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid #26292D;
    font-size: 13px;
  }

  .row:last-child { border-bottom: none; }

  .row .name { font-weight: 600; }
  .row .meta { color: var(--slate); font-size: 12px; }

  .tag {
    font-size: 10px;
    letter-spacing: 1px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .tag.stale { background: rgba(194, 101, 74, 0.18); color: var(--stale); }
  .tag.healthy { background: rgba(91, 140, 90, 0.18); color: var(--healthy); }

  .empty {
    color: var(--slate);
    font-size: 13px;
    padding: 8px 0;
  }

  .achievements {
    background: var(--graphite-light);
    border: 1px solid #2A2E32;
    border-radius: 4px;
    padding: 18px;
  }

  .achievement-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #26292D;
    font-size: 13px;
  }

  .achievement-item:last-child { border-bottom: none; }

  .check {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    margin-top: 2px;
  }

  .achievement-summary { color: var(--bone); }
  .achievement-time { color: var(--slate); font-size: 11px; margin-top: 2px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #2A2E32; border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="chat-rail">
    <div class="brand">
      <div class="eyebrow">NEXALITH</div>
      <h1>FOREMAN</h1>
      <div class="underline"></div>
    </div>
    <div class="chat-log" id="chatLog">
      <div class="msg agent">Ready. Ask me about deals, onboarding, or content -- I'll run the checks and report back.</div>
    </div>
    <div class="chat-input-row">
      <input id="chatInput" type="text" placeholder="Ask Foreman..." autocomplete="off">
      <button id="sendBtn">SEND</button>
    </div>
  </div>

  <div class="board">
    <div class="board-header">
      <div class="eyebrow">OPERATIONS</div>
      <h2>Status Board</h2>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-title">CRM DEALS <span class="count" id="dealCount">--</span></div>
        <div id="dealList"></div>
      </div>

      <div class="panel">
        <div class="panel-title">UPCOMING ONBOARDING <span class="count" id="onboardCount">--</span></div>
        <div id="onboardList"></div>
      </div>
    </div>

    <div class="achievements">
      <div class="panel-title">RECENT ACHIEVEMENTS <span class="count" id="achCount">--</span></div>
      <div id="achList"></div>
    </div>
  </div>
</div>

<script>
const API = "";

function checkSvg() {
  return '<svg class="check" viewBox="0 0 24 24" fill="none">' +
    '<path d="M4 12.5L9 17.5L20 5" stroke="#E8A23D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</svg>';
}

async function loadDeals() {
  const res = await fetch(API + "/api/deals");
  const data = await res.json();
  const list = document.getElementById("dealList");
  const count = document.getElementById("dealCount");
  count.textContent = data.deals.length;
  if (!data.deals.length) {
    list.innerHTML = '<div class="empty">No open deals.</div>';
    return;
  }
  list.innerHTML = data.deals.map(function(d) {
    return '<div class="row">' +
      '<div>' +
        '<div class="name">' + d.client_name + '</div>' +
        '<div class="meta">' + d.rep + ' \u00b7 $' + d.value_usd.toLocaleString() + ' \u00b7 ' + d.stage.replace('_',' ') + '</div>' +
      '</div>' +
      '<span class="tag ' + (d.is_stale ? 'stale' : 'healthy') + '">' + (d.is_stale ? 'STALE' : 'ACTIVE') + '</span>' +
    '</div>';
  }).join("");
}

async function loadOnboarding() {
  const res = await fetch(API + "/api/onboarding");
  const data = await res.json();
  const list = document.getElementById("onboardList");
  const count = document.getElementById("onboardCount");
  count.textContent = data.upcoming.length;
  if (!data.upcoming.length) {
    list.innerHTML = '<div class="empty">No upcoming starters.</div>';
    return;
  }
  list.innerHTML = data.upcoming.map(function(e) {
    const done = e.onboarding_checklist.filter(function(i) { return i.done; }).length;
    const total = e.onboarding_checklist.length;
    return '<div class="row">' +
      '<div>' +
        '<div class="name">' + e.name + '</div>' +
        '<div class="meta">' + e.role + ' \u00b7 starts in ' + e.days_until_start + 'd</div>' +
      '</div>' +
      '<span class="tag ' + (done === total ? 'healthy' : 'stale') + '">' + done + '/' + total + '</span>' +
    '</div>';
  }).join("");
}

async function loadAchievements() {
  const res = await fetch(API + "/api/achievements");
  const data = await res.json();
  const list = document.getElementById("achList");
  const count = document.getElementById("achCount");
  count.textContent = data.achievements.length;
  if (!data.achievements.length) {
    list.innerHTML = '<div class="empty">No completed actions yet -- ask Foreman something to get started.</div>';
    return;
  }
  list.innerHTML = data.achievements.map(function(a) {
    return '<div class="achievement-item">' +
      checkSvg() +
      '<div>' +
        '<div class="achievement-summary">' + a.summary + '</div>' +
        '<div class="achievement-time">' + a.action + ' \u00b7 ' + new Date(a.timestamp).toLocaleString() + '</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

function renderMarkdown(text) {
  // Minimal, safe markdown rendering: escape HTML first, then apply
  // a small set of patterns. Deliberately not a full parser -- this
  // only needs to handle what the model actually produces (###
  // headers, **bold**, and line breaks).
  const escaped = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  return escaped
    .replace(/^### (.*)$/gm, "<strong class=\"md-h\">$1</strong>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

function addMessage(text, role, isMarkdown) {
  const log = document.getElementById("chatLog");
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (isMarkdown) {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const btn = document.getElementById("sendBtn");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";
  btn.disabled = true;

  const loadingEl = addMessage("Working on it...", "agent loading");

  try {
    const res = await fetch(API + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    loadingEl.innerHTML = renderMarkdown(data.response);
    loadingEl.classList.remove("loading");
  } catch (err) {
    loadingEl.textContent = "Couldn't reach the model. Is llama-server running?";
    loadingEl.classList.remove("loading");
  }

  btn.disabled = false;
  loadDeals();
  loadOnboarding();
  loadAchievements();
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("chatInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendMessage();
});

loadDeals();
loadOnboarding();
loadAchievements();
</script>
</body>
</html>
